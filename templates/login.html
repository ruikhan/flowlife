<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — FlowLife</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">🌊</div>
      <div class="auth-title">FlowLife</div>
      <div class="auth-sub">Plan it. Track it. Live it.</div>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ 'success' if category == 'success' else 'error' }}">
          {{ '✅' if category == 'success' else '⚠️' }} {{ message }}
        </div>
      {% endfor %}
    {% endwith %}
    <form method="POST">
      <div class="form-group">
        <label class="form-label" for="username">Username or Email</label>
        <input type="text" id="username" name="username" class="form-control" placeholder="Enter username or email" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" name="password" class="form-control" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg mt-8">Sign In →</button>
    </form>
    <div class="auth-link-row">
      <span>Don't have an account? </span>
      <a href="{{ url_for('register') }}" class="auth-link">Create one free</a>
    </div>
    <div class="auth-hint">Developer: Justine Villarosa</div>
  </div>
</div>
</body>
</html>
