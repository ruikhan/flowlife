<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — FlowLife</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">🌊</div>
      <div class="auth-title">Create Account</div>
      <div class="auth-sub">Start your productivity journey</div>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ 'success' if category == 'success' else 'error' }}">
          {{ '✅' if category == 'success' else '⚠️' }} {{ message }}
        </div>
      {% endfor %}
    {% endwith %}
    <form method="POST">
      <div class="form-group">
        <label class="form-label" for="full_name">Full Name</label>
        <input type="text" id="full_name" name="full_name" class="form-control" placeholder="Your full name" required>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input type="text" id="username" name="username" class="form-control" placeholder="username" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input type="email" id="email" name="email" class="form-control" placeholder="email@example.com" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" name="password" class="form-control" placeholder="Create a strong password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg mt-8">Create Account →</button>
    </form>
    <div class="auth-link-row">
      Already have an account? <a href="{{ url_for('login') }}" class="auth-link">Sign in</a>
    </div>
  </div>
</div>
</body>
</html>
